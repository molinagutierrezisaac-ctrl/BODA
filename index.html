<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Isaac y Sofía</title>

<style>
  /* Estilos generales */
  body {
    margin: 0;
    background: #f5f0eb;
    display: flex;
    justify-content: center;
    font-family: 'Georgia', serif;
  }

  .container {
    position: relative;
    width: 300px; /* ajusta según necesites */
  }

  /* Imagen */
  .container img {
    width: 100%;
    height: auto;
    border-radius: 15px;
    display: block;
  }

  /* Contador */
  #countdown {
    position: absolute;
    bottom: 20px; /* 20px desde el borde inferior de la imagen */
    width: 100%;
    text-align: center;
    color: #a67c52;
    font-size: 16px;
    letter-spacing: 2px;
  }

  /* Botón Google Maps */
  .btn-maps {
    display: block;
    width: 160px;
    margin: 10px auto;
    text-align: center;
    background: #a67c52;
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: background 0.3s;
  }

  .btn-maps:hover {
    background: #8b5e3c;
  }

  /* Reproductor de audio */
  audio {
    display: block;
    margin: 15px auto;
    width: 80%;
  }

</style>
</head>
<body>

<div class="container">

  <!-- IMAGEN -->
  <img src="Invitación Isaac y Sofia.png" alt="Invitación Isaac y Sofía">

  <!-- CONTADOR -->
  <div id="countdown"></div>

  <!-- BOTÓN GOOGLE MAPS -->
  <a href="https://maps.app.goo.gl/FT7mFgKbXzcSF8Wh7" target="_blank" class="btn-maps">
    Ver ubicación
  </a>

  <!-- REPRODUCTOR DE MÚSICA -->
  <audio controls>
    <source src="canción.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

</div>

<!-- SCRIPT CONTADOR -->
<script>
  var countDownDate = new Date("Jul 25, 2026 18:30:00").getTime();

  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById("countdown").innerHTML =
      days + " DÍAS " + hours + " HRS " + minutes + " MIN";

    if (distance < 0) {
      clearInterval(x);
      document.getElementById("countdown").innerHTML = "¡ES HOY!";
    }
  }, 1000);
</script>

</body>
</html>
